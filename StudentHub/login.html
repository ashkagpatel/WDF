<html>
    <head>
        <title>Login</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1><p align="center">STUDENT LOGIN</p></h1>
    </br>

    <form action="dashboard.html" method="post" align="center">
        <p>
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" placeholder="Enter your Email" required>
        </p>

        <p>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" pattern="[A-Z]{3}[1-4]{3}" required>
        </p>

        <p>
            <input type="submit" id="login" name="login" value="LOGIN" ><br>
        </p>


    </form>
      
        <h4>Forgot Password??</h4>

         <a href="register.html">Register Here</a>

      

    </body>
</html>
