<html>
    <head>
        <title>Login</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1><p align="center">STUDENT REGISTRATION</p></h1>
    </br>

       <form action="login.html" method="post">

       </br>
       </br>

       <p align="center"><input type="submit" value="REGISTER"></p> 

    </form>




    </body>
